{% set mid = modal_id %}
<div id="{{ mid }}" class="fixed inset-0 z-50 hidden flex items-center justify-center pointer-events-none">

    <!-- overlay -->
    <div class="absolute inset-0 bg-black bg-opacity-40 transition-opacity pointer-events-auto"
         onclick="closeModal('{{ mid }}')"></div>

    <!-- modal panel -->
    <div class="relative z-10 max-w-2xl w-full mx-4 pointer-events-auto">
        <div id="{{ mid }}_panel"
             class="bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden transform transition-all scale-95 opacity-0">

            <!-- header -->
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-start justify-between">
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-white">
                        {{ modal_title or "Information" }}
                    </h3>
                </div>
                <button aria-label="Close"
                        class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200"
                        onclick="closeModal('{{ mid }}')">✕</button>
            </div>

            <!-- content -->
            <div class="p-6 prose prose-slate dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 text-left overflow-y-auto max-h-96">
                {{ modal_content | safe }}
            </div>

            <!-- footer -->
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 text-right">
                <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg"
                        onclick="closeModal('{{ mid }}')">
                    Ok
                </button>
            </div>

        </div>
    </div>
</div>
