<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendar Data Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
</head>

<body class="bg-gray-100 text-gray-900 flex flex-col items-center min-h-screen font-sans">

{% include 'navbar.html' %}

<!-- Header Icon -->
<div class="mt-16">
    <img src="{{ url_for('static', filename='images/icon.png') }}" class="w-24 h-24" alt="App icon">
</div>

<!-- Title -->
<h1 class="mt-10 text-4xl font-semibold mb-4 text-gray-800">
    Calendar Data Manager
</h1>

<!-- Main buttons -->
<div class="flex flex-col items-center mt-12 space-y-4 w-full max-w-sm">

    <a href="/new-events" class="button-main flex items-center justify-center gap-2">
        <img src="{{ url_for('static', filename='images/plus.png') }}" class="w-5 h-5" alt="">
        New Events
    </a>    

    <a href="/edit-events" class="button-main flex items-center justify-center gap-2">
        <img src="{{ url_for('static', filename='images/edit.png') }}" class="w-5 h-5" alt="">
        Edit Events
    </a>

    <a href="/get-events" class="button-main flex items-center justify-center gap-2">
        <img src="{{ url_for('static', filename='images/list.png') }}" class="w-5 h-5" alt="">
        Get Events
    </a>
</div>

<!-- Donation section -->
<div class="fixed bottom-6 left-6 text-gray-500">

    {% if show_msg_section %}
    <p class="text-sm italic mb-2 opacity-80">
        Support the project or learn more:
    </p>
    {% endif %}

    <div class="flex flex-row space-x-3">
        {% if show_github %}
        <a href="{{ github_link }}" target="_blank" class="icon-link">
            <img src="{{ url_for('static', filename='images/github.png') }}" alt="GitHub">
        </a>
        {% endif %}
        {% if show_buymeacoffee %}
        <a href="{{ buymeacoffee_link }}" target="_blank" class="icon-link">
            <img src="{{ url_for('static', filename='images/donation.png') }}" alt="Buy Me a Coffee">
        </a>
        {% endif %}
        {% if show_paypal %}
        <a href="{{ paypal_link }}" target="_blank" class="icon-link">
            <img src="{{ url_for('static', filename='images/paypal.png') }}" alt="PayPal">
        </a>
        {% endif %}
    </div>
</div>

<!-- Version -->
<div class="fixed bottom-4 right-4 text-gray-400 text-sm">
    Version {{ version }}
</div>

</body>
</html>
