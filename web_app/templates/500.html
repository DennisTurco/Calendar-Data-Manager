<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Server Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .error-details {
            font-size: 1rem;
            color: #6c757d;
            margin-bottom: 20px;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-message">Oops! Something went wrong on our server.</div>
        <div class="error-details">Error: {{ error }}</div>
        <a href="/" class="btn btn-primary mb-2">Back to Home</a>
        <br>
        <a href="{{github_issue_link}}" class="btn btn-outline-danger" target="_blank">
            Report this issue on GitHub
        </a>
    </div>
</body>
</html>
