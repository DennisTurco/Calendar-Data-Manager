<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs</title>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <!-- Apply theme early to avoid flash -->
    <script src="{{ url_for('static', filename='js/darkmode.js') }}"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen font-sans transition-colors duration-200">

    {% include "components/toast.html" %}
    {% include "navbar.html" %}
    {% include "sidebar.html" %}

    <main class="w-full pl-0 md:pl-48 pt-16">

        <!-- HEADER -->
        <header class="mt-12 text-center">
            <div class="flex items-center justify-center gap-3">
                <h1 class="text-4xl font-semibold text-gray-800 dark:text-white">Graphs</h1>
            </div>
            <div class="mt-3">
                <a href="/get-events" class="button-secondary inline-flex items-center gap-2 px-4 py-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Back to filters
                </a>
            </div>
        </header>

        <div class="mx-auto max-w-5xl px-4 mt-8 flex flex-col gap-8 pb-12">
            {% if graph_htmls %}
                {% for graph_html in graph_htmls %}
                    <div class="w-full bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-4 overflow-x-auto">
                        {{ graph_html | safe }}
                    </div>
                {% endfor %}
            {% else %}
                <div class="text-center text-gray-500 dark:text-gray-400 py-16">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <p class="text-lg">No graphs to display.</p>
                    <a href="/get-events" class="button-primary inline-flex mt-4 px-5 py-2">Go back and fetch events</a>
                </div>
            {% endif %}
        </div>

    </main>

    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>

</body>
</html>
