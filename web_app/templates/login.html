<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Calendar Data Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <script src="{{ url_for('static', filename='js/darkmode.js') }}"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex flex-col items-center justify-center min-h-screen font-sans transition-colors duration-200">

    <!-- Dark mode toggle (top right) -->
    <div class="fixed top-4 right-4">
        <button id="darkModeToggle"
                onclick="toggleDarkMode()"
                class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-100 p-2 rounded-full bg-white dark:bg-gray-800 shadow transition"
                title="Toggle dark mode" aria-label="Toggle dark mode">
        </button>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-10 max-w-sm w-full mx-4 text-center">
        <img src="{{ url_for('static', filename='images/icon.png') }}" class="w-16 h-16 mx-auto mb-4" alt="App icon">
        <h1 class="text-2xl font-semibold text-gray-800 dark:text-white mb-1">Calendar Data Manager</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">Sign in to manage your Google Calendar</p>

        <form action="{{ url_for('login.google_login') }}" method="post">
            <button type="submit"
                    class="flex items-center justify-center gap-3 w-full py-3 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-medium transition shadow"
                    title="Login using your Google account">
                <img src="/static/images/google.png" class="w-5 h-5" alt="Google">
                Sign in with Google
            </button>
        </form>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="mt-4 space-y-1">
            {% for msg in messages %}
                <p class="text-red-500 text-sm">{{ msg }}</p>
            {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
    </div>

</body>
</html>
